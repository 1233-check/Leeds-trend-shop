<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout — Leeds Trend Shop</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',system-ui,sans-serif; background:#0a0a0a; color:#f5f0eb; -webkit-font-smoothing:antialiased; padding: 2rem; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .glass-card { background:rgba(25, 28, 32, 0.4); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border:1px solid rgba(255,255,255,0.08); box-shadow:0 15px 45px rgba(0,0,0,0.4); padding: 4rem; border-radius: 16px; text-align: center; max-width: 600px; width: 100%; }
    h1 { font-family:'Outfit',sans-serif; font-size: 2.5rem; margin-bottom: 1rem; color: #c8a44e; }
    p { line-height: 1.6; opacity: 0.7; margin-bottom: 2rem; }
    .back-btn { display: inline-block; padding: 1rem 3rem; background: transparent; border: 1px solid #c8a44e; color: #c8a44e; font-weight: 600; text-transform: uppercase; letter-spacing: 0.15em; font-size: 0.75rem; text-decoration: none; border-radius: 8px; transition: all 0.3s; }
    .back-btn:hover { background: #c8a44e; color: #0a0a0a; }
  </style>
</head>
<body>
  <div class="glass-card">
    <h1>Checkout Locked</h1>
    <p>This is a premium static demo crafted for the Leeds Trend Shop client presentation. End-to-end checkout processing and database integrations will be provisioned following final client approval.</p>
    <a href="index.html" class="back-btn">Return to Shop</a>
  </div>
</body>
</html>
